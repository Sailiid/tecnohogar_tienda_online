<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnohogar | Tienda de Tecnología</title>
  <link rel="shortcut icon" href="./imagenes1/Copilot_20260530_164743.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
</head>

<body class="bg-dark text-light">
  <!-- 🔹 Menú principal -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">Tecnohogar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="ayuda.html">Ayuda</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 🔹 Filtros -->
  <section class="container mt-4">
    <div class="row">
      <aside class="col-md-3">
        <h5 class="text-center">Filtrar por categoría</h5>
        <div id="checks" class="d-flex flex-column gap-2">
          <div v-for="category in categorias" class="form-check">
            <input v-model="categoriasSeleccionadas" class="form-check-input" type="checkbox" :id="category" :value="category">
            <label class="form-check-label" :for="category">Categorias</label>
          </div>
        </div>

        <h5 class="mt-3 text-center">Buscar producto</h5>
        <input v-model="textoBuscador" class="form-control" type="search" placeholder="Buscar...">
      </aside>

      <!-- 🔹 Tarjetas de productos -->
      <main class="col-md-9">
        <h2 class="text-center mb-3">Productos disponibles</h2>
        <div v-if="productos.length == 0" class="text-center">
          <p>No se encontraron productos.</p>
        </div>

        <div id="cards" class="d-flex flex-wrap justify-content-center gap-3">
          <div v-for="product in productos" class="card bg-light text-dark" style="width: 18rem;">
            <img src="./imagenes1/teclado/pexels-alexeydemidov-32313566.jpg" class="card-img-top" alt="Producto">
            <div class="card-body">
              <h6 class="card-title">COMPUTADOR</h6>
              <p class="card-text">Computador de mesa, 230mb xxxxxx</p>
              <p class="fw-bold">Precio: 630.000</p>
              <button @click="agregarFavorito(product)" class="btn btn-outline-primary w-100">Agregar a favoritos</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </section>

  <footer class="text-center mt-4 p-3 bg-primary text-light">
    <p>© 2026 Tecnohogar - Tecnología para tu hogar</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/index.js" type="module"></script>
</body>
</html>
