<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnohogar | Tienda de Tecnología</title>
  <link rel="shortcut icon" href="./imagenes1/Copilot_20260530_164743.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Frontend/css/style.css">
</head>

<body class="bg-dark text-light">
  <!-- 🔹 Menú principal -->

<div class="bg-dark text-white py-2">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <strong class="me-5">Tecnohogar | Tienda de Tecnología</strong>
    </div>
    <div class="d-flex align-items-center">
      <a href="#" class="ms-3 text-white"><i class="fa fa-user"></i>  Mi cuenta</a>
      <a href="#" class="ms-3 text-white"><i class="fa fa-heart"></i>  (0)</a>
      <a href="#" class="ms-3 text-white"><i class="fa fa-shopping-cart"></i>  (0)</a>
    </div>
  </div>
</div>

<!-- Barra de búsqueda -->
<div class="bg-light py-3">
  <div class="container d-flex justify-content-center">
    
    <form class="d-flex w-50">
      <input class="form-control me-2" type="search" placeholder="Buscar productos...">
      <button class="btn btn-danger" type="submit">Buscar</button>
    </form>
  </div>
</div>

<!-- Navbar principal -->
<nav class="justify-content-center navbar navbar-expand-lg bg-primary"> ">
  <div class="container bg-primary text-white py-2">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse bg-primary" id="menuPrincipal">
         <ul class="nav justify-content-center">
                 <li class="nav-item">
                  <a class="nav-link active text-white" aria-current="page" href="index.html">Inicio</a>
                </li>
                 <li class="nav-item">
                 <a class="nav-link active text-white" aria-current="page" href="ayuda.html">Ayuda</a>
                 </li>
                <li class="nav-item">
                  <a class="nav-link active text-white" aria-current="page" href="contacto.html">Contacto</a>
                </li>
        </ul>
    </div>
  </div>
</nav>

  <!-- 🔹 Filtros -->
  <section class="container mt-4">
    <div class="row">
      <aside class="col-md-3">
        <h5 class="text-center">Filtrar por categoría</h5>
        <div id="checks" class="d-flex flex-column gap-2">
          <div v-for="category in categorias" class="form-check">
            <input v-model="categoriasSeleccionadas" class="form-check-input" type="checkbox" :id="category" :value="category">
            <label class="form-check-label" :for="category">Categorias</label>
          </div>
        </div>

        
      </aside>

      <!-- 🔹 Tarjetas de productos -->
      <main class="col-md-9">
        <h2 class="text-center mb-3">Productos disponibles</h2>
        <div v-if="productos.length == 0" class="text-center">
          <p>No se encontraron productos.</p>
        </div>

        <div id="cards" class="d-flex flex-wrap justify-content-center gap-3">
          <div v-for="product in productos" class="card bg-light text-dark" style="width: 18rem;">
            <img src="./imagenes1/computadores/pexels-andrei-l-335499537-31145466.jpg" class="card-img-top" alt="Producto">
            <div class="card-body">
              <h6 class="card-title">COMPUTADOR</h6>
              <p class="card-text">Computador de mesa, 230mb xxxxxx</p>
              <p class="fw-bold">Precio: 630.000</p>
              <button @click="agregarFavorito(product)" class="btn btn-outline-primary w-100">Agregar a favoritos</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </section>

  <footer class="text-center mt-4 p-3 bg-primary text-light">
    <p>© 2026 Tecnohogar - Tecnología para tu hogar</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/index.js" type="module"></script>
</body>
</html>
